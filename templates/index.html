<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI331-L Task4+5</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="card">
            <header class="card-header">
                <h2>Predict age and gender using finetuned VGG16</h2>
                <p>Upload an image to run the inference model</p>
            </header>

            <form id="inference-form" class="upload-section">
                <div class="file-input-wrapper" id="drop-zone">
                    <label for="image-upload" class="file-label">
                        <div class="upload-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        </div>
                        <span id="file-name">Click or drag an image here</span>
                        <input type="file" id="image-upload" name="file" accept="image/png, image/jpeg, image/jpg" required>
                    </label>
                </div>
                
                <div id="image-preview-container" class="hidden">
                    <img id="image-preview" src="" alt="Image preview">
                    <button type="button" id="clear-image-btn" class="icon-button" aria-label="Clear image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <button type="submit" id="submit-btn" class="primary-button" disabled>
                    Run Inference
                </button>
            </form>

            <div id="loading-state" class="state-panel hidden">
                <div class="spinner"></div>
                <span>Running model inference...</span>
            </div>

            <div id="results-panel" class="state-panel results hidden">
                <h3>Inference Results</h3>
                <div class="result-grid">
                    <div class="result-item">
                        <span class="result-label">Predicted Gender</span>
                        <span id="result-gender" class="result-value">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Estimated Age</span>
                        <span id="result-age" class="result-value">-</span>
                    </div>
                </div>
            </div>

            <div id="error-panel" class="state-panel error hidden">
                <span id="error-message"></span>
            </div>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
